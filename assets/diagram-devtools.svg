<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440">
  <defs>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#E5E7EB" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="440" fill="#FFFFFF"/>
  <rect width="900" height="440" fill="url(#grid3)"/>
  <rect x="0" y="0" width="2" height="440" fill="#82AAFF" opacity="0.3"/>

  <!-- Reference -->
  <text x="50" y="45" fill="#82AAFF" font-family="monospace" font-size="10" opacity="0.5" letter-spacing="1">REF: DEVTOOLS_03</text>

  <!-- Title -->
  <text x="50" y="85" fill="#1F2328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="bold">BUILT-IN DEVTOOLS</text>

  <!-- Description -->
  <text x="50" y="118" fill="#656D76" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">One line to enable. Four tools no other TUI framework has.</text>
  <text x="50" y="138" fill="#656D76" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">All run as render middleware — non-blocking, the app keeps running.</text>

  <!-- Tool 1 -->
  <g transform="translate(50, 170)">
    <text x="0" y="18" fill="#82AAFF" font-family="monospace" font-size="28" font-weight="bold" opacity="0.2">01</text>
    <text x="42" y="14" fill="#1F2328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold">RENDER HEATMAP</text>
    <text x="42" y="34" fill="#656D76" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12">Changed cells glow red. Stable cells fade to blue.</text>
    <text x="42" y="52" fill="#8B949E" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12">See exactly where your UI is doing unnecessary work.</text>
  </g>

  <!-- Mini heatmap visualization -->
  <g transform="translate(620, 175)">
    <rect x="0" y="0" width="20" height="14" rx="2" fill="#FF4444" fill-opacity="0.5"/>
    <rect x="22" y="0" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="44" y="0" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="66" y="0" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="88" y="0" width="20" height="14" rx="2" fill="#C8D8F0" fill-opacity="0.3"/>
    <rect x="110" y="0" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="132" y="0" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>

    <rect x="0" y="16" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="22" y="16" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="44" y="16" width="20" height="14" rx="2" fill="#FF8800" fill-opacity="0.3"/>
    <rect x="66" y="16" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="88" y="16" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="110" y="16" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="132" y="16" width="20" height="14" rx="2" fill="#FF4444" fill-opacity="0.4"/>

    <rect x="0" y="32" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="22" y="32" width="20" height="14" rx="2" fill="#C8D8F0" fill-opacity="0.2"/>
    <rect x="44" y="32" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="66" y="32" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="88" y="32" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="110" y="32" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
    <rect x="132" y="32" width="20" height="14" rx="2" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.5"/>
  </g>

  <!-- Separator -->
  <line x1="50" y1="240" x2="860" y2="240" stroke="#D1D9E0" stroke-width="0.5"/>

  <!-- Tool 2 -->
  <g transform="translate(50, 258)">
    <text x="0" y="18" fill="#82AAFF" font-family="monospace" font-size="28" font-weight="bold" opacity="0.2">02</text>
    <text x="42" y="14" fill="#1F2328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold">ACCESSIBILITY AUDIT</text>
    <text x="42" y="34" fill="#656D76" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12">Live WCAG 4.5:1 contrast checking on every rendered cell.</text>
    <text x="42" y="52" fill="#8B949E" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12">Not a mockup. The actual terminal output, after paint.</text>
  </g>

  <!-- Mini a11y -->
  <g transform="translate(640, 262)">
    <text x="0" y="14" fill="#1F2328" font-family="monospace" font-size="11">Hello</text>
    <text x="60" y="14" fill="#1A7F37" font-family="monospace" font-size="10">PASS</text>
    <text x="0" y="34" fill="#BBBBBB" font-family="monospace" font-size="11">Dark</text>
    <text x="60" y="34" fill="#CF222E" font-family="monospace" font-size="10">FAIL</text>
    <line x1="0" y1="38" x2="35" y2="38" stroke="#CF222E" stroke-width="1"/>
  </g>

  <!-- Separator -->
  <line x1="50" y1="328" x2="860" y2="328" stroke="#D1D9E0" stroke-width="0.5"/>

  <!-- Tool 3 & 4 side by side -->
  <g transform="translate(50, 346)">
    <text x="0" y="18" fill="#82AAFF" font-family="monospace" font-size="28" font-weight="bold" opacity="0.2">03</text>
    <text x="42" y="14" fill="#1F2328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold">TIME-TRAVEL</text>
    <text x="42" y="34" fill="#656D76" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12">Freeze. Scrub 120 frames. See what changed.</text>
  </g>

  <!-- Mini timeline -->
  <g transform="translate(380, 350)">
    <rect x="0" y="4" width="160" height="4" rx="2" fill="#D1D9E0"/>
    <rect x="0" y="4" width="96" height="4" rx="2" fill="#D1D9E0"/>
    <circle cx="96" cy="6" r="5" fill="#82AAFF"/>
    <text x="0" y="24" fill="#8B949E" font-family="monospace" font-size="9">frame 73 / 120</text>
  </g>

  <g transform="translate(600, 346)">
    <text x="0" y="18" fill="#82AAFF" font-family="monospace" font-size="28" font-weight="bold" opacity="0.2">04</text>
    <text x="42" y="14" fill="#1F2328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold">INSPECTOR</text>
    <text x="42" y="34" fill="#656D76" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12">Tree. Styles. FPS. Events.</text>
  </g>

  <!-- Bottom -->
  <line x1="50" y1="405" x2="860" y2="405" stroke="#D1D9E0" stroke-width="0.5"/>
  <text x="455" y="425" fill="#8B949E" font-family="monospace" font-size="10" text-anchor="middle">enableDevTools(app)  —  one line  —  four tools  —  non-blocking</text>
</svg>